<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Draw</title>
  </head>
  <body>
    <div id="app">
      <div class="settings-container">
        <form id="settings-form">
          <div class="settings-form-item">
            <label>Aspect ratio:</label>
            <div>
              <label for="16:9" class="custom-radio">
                <input type="radio" id="16:9" name="aspect-ratio" value="16:9" checked="checked">
                <span class="checkmark">16:9</span>
              </label>
              <label for="9:16" class="custom-radio">
                <input type="radio" id="9:16" name="aspect-ratio" value="9:16">
                <span class="checkmark">9:16</span>
              </label>
            </div>
          </div>

          <div class="settings-form-item">
            <label>FFT size:</label>
            <div>
              <label for="fft-32" class="custom-radio">
                <input type="radio" id="fft-32" name="fft-size" value="32">
                <span class="checkmark">32</span>
              </label>
              <label for="fft-64" class="custom-radio">
                <input type="radio" id="fft-64" name="fft-size" value="64">
                <span class="checkmark">64</span>
              </label>
              <label for="fft-128" class="custom-radio">
                <input type="radio" id="fft-128" name="fft-size" value="128" checked="checked">
                <span class="checkmark">128</span>
              </label>
              <label for="fft-256" class="custom-radio">
                <input type="radio" id="fft-256" name="fft-size" value="256">
                <span class="checkmark">256</span>
              </label>
            </div>
          </div>
        </form>
      </div>

      <div class="app-center">
        <div class="canvas-container">
          <canvas id="canvas" class="canvas"></canvas>
        </div>
        <div class="audio-container">
          <audio id="audio" class="audio" controls crossorigin="anonymous"></audio>
        </div>
      </div>


      <div class="menu-container">
        <div class="btn-container">
          <button id="render-btn" class="render-btn">Render</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
