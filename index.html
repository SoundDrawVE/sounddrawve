<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Draw</title>
    <style>
      #cover {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1D1E22;
        display: flex;
        flex-direction: column;
        gap: 20px;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .spinner {
        box-sizing: border-box;
        border: 4px solid #3A3B40;
        border-top: 4px solid #2196F3;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        animation: spin 1s linear infinite;
      }

      .cover-message {
        color: #FFFFFF;
        font-size: 14px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); } 
      }
    </style>
  </head>
  <body>
    <div id="cover">
      <div class="spinner"></div>
      <div class="cover-message">The application is loading...</div>
    </div>

    <div id="app">
      <div class="settings-container sidebar">
        <h2>Settings</h2>
        <form id="settings-form">
          <div class="group">
            <div class="group-title">Output</div>
            <div class="group-item">
              <div class="settings-form-item item">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6">
                  <rect x="3" y="6" width="18" height="12" rx="2"/>
                  <path d="M8 10h2M14 10h2"/>
                  <path d="M12 9v6"/>
                </svg>
                <div class="label">Aspect Ratio</div>
                <div class="value">16:9</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="expand">
                <div class="option active">
                  <label for="16:9" class="custom-radio">
                    <input type="radio" id="16:9" name="aspect-ratio" value="16:9" checked="checked">
                    <span class="checkmark" data-name="aspect-ratio">16:9</span>
                  </label>
                </div>
                <div class="option">
                  <label for="9:16" class="custom-radio">
                    <input type="radio" id="9:16" name="aspect-ratio" value="9:16">
                    <span class="checkmark" data-name="aspect-ratio">9:16</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
          
          <div class="group">
            <div class="group-title">Audio Analysis</div>
            <div class="group-item">
              <div class="settings-form-item item">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6">
                  <path d="M3 18V6"/>
                  <path d="M7 16V8"/>
                  <path d="M11 20V4"/>
                  <path d="M15 14V10"/>
                  <path d="M19 17V7"/>
                </svg>
                <div class="label">FFT Size</div>
                <div class="value">128</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="expand">
                <div class="option">
                  <label for="fft-32" class="custom-radio">
                    <input type="radio" id="fft-32" name="fft-size" value="32">
                    <span class="checkmark" data-name="fft-size">32</span>
                  </label>
                </div>
                <div class="option">
                  <label for="fft-64" class="custom-radio">
                    <input type="radio" id="fft-64" name="fft-size" value="64">
                    <span class="checkmark" data-name="fft-size">64</span>
                  </label>
                </div>
                <div class="option active">
                  <label for="fft-128" class="custom-radio">
                    <input type="radio" id="fft-128" name="fft-size" value="128" checked="checked">
                    <span class="checkmark" data-name="fft-size">128</span>
                  </label>
                </div>
                <div class="option">
                  <label for="fft-256" class="custom-radio">
                    <input type="radio" id="fft-256" name="fft-size" value="256">
                    <span class="checkmark" data-name="fft-size">256</span>
                  </label>
                </div>
              </div>
            </div>

            <div class="group-item">
              <div class="settings-form-item item">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6">
                  <path d="M4 18h2V10H4z"/>
                  <path d="M8 18h2V6H8z"/>
                  <path d="M12 18h2V12h-2z"/>
                  <path d="M16 18h2V8h-2z"/>
                </svg>
                <div class="label">Frequencies</div>
                <div class="value">ALL</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="expand">
                <div class="option active">
                  <label for="freq-number-all" class="custom-radio">
                    <input type="radio" id="freq-number-all" name="freq-type" value="all" checked="checked">
                    <span class="checkmark" data-name="freq-type" data-value="all">ALL</span>
                  </label>
                </div>
                <div class="option">
                  <label for="freq-number-select" class="custom-radio">
                    <input type="radio" id="freq-number-select" name="freq-type" value="select">
                    <span class="checkmark">Select</span>
                  </label>
                </div>
                <div class="freq-number-container hide">
                  <button id="freq-number-decr" data-type="decr">-1</button>
                  <span id="freq-number" data-max="64" data-value="64" data-name="freq-number">64</span>
                  <button id="freq-number-incr" data-type="incr">+1</button>
                </div>
              </div>
            </div>
          </div>
          
          <div class="group">
            <div class="group-title">Visual</div>
            <div class="group-item">
              <div class="settings-form-item item">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6">
                  <circle cx="12" cy="12" r="5"/>
                  <circle cx="18" cy="6" r="1.5"/>
                  <circle cx="6" cy="18" r="1.5"/>
                </svg>
                <div class="label">Color</div>
                <div class="value">Default</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="expand">
                <div class="option active">
                  <label for="color-default" class="custom-radio">
                    <input type="radio" id="color-default" name="colorType" value="default" checked="checked">
                    <span class="checkmark">Default</span>
                  </label>
                </div>
                <div class="option">
                  <label for="color-select" class="custom-radio">
                    <input type="radio" id="color-select" name="colorType" value="select">
                    <span class="checkmark">Select</span>
                  </label>
                </div>
                <div class="option">
                  <label for="color-rainbow" class="custom-radio">
                    <input type="radio" id="color-rainbow" name="colorType" value="rainbow">
                    <span class="checkmark">Rainbow</span>
                  </label>
                </div>
                <div class="option">
                  <label for="color-enhanced" class="custom-radio">
                    <input type="radio" id="color-enhanced" name="colorType" value="enhanced">
                    <span class="checkmark">Enhanced</span>
                  </label>
                </div>
                <div class="color-picker-container hide">
                  <!-- Main SV Square -->
                  <canvas id="colorCanvas" width="230" height="150"></canvas>
                  <div class="controls">
                    <!-- Hue Slider -->
                    <input type="range" id="hueRange" name="color" min="0" max="360" value="287" class="picker-slider hue-slider">
                    <!-- Opacity Slider -->
                    <input type="range" id="opacityRange" name="color" min="0" max="100" value="100" class="picker-slider opacity-slider">
                    <!-- Result Display -->
                    <div class="picker-result-container">
                      <div id="colorPreview" class="preview-box"></div>
                      <input type="text" id="colorCode" name="color" readonly>
                      <div class="picker-result">
                        <div><span id="picker-hex">#feda6a</span></div>
                        <div><span id="picker-opacity">1</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="group-item">
              <div class="settings-form-item item">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <path d="M3 9h18M9 3v18"/>
                </svg>
                <div class="label">Wave Area</div>
                <div class="value">ON</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="expand">
                <div class="option active">
                  <label for="area-on" class="custom-radio">
                    <input type="radio" id="area-on" name="visibility-area" value="on" checked="checked">
                    <span class="checkmark" data-name="visibility-area">ON</span>
                  </label>
                </div>
                <div class="option">
                  <label for="area-off" class="custom-radio">
                    <input type="radio" id="area-off" name="visibility-area" value="off">
                    <span class="checkmark" data-name="visibility-area">OFF</span>
                  </label>
                </div>
              </div>
            </div>

            <div class="group-item">
              <div class="settings-form-item item">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6">
                  <path d="M4 18h3V9H4z"/>
                  <path d="M10 18h3V5h-3z"/>
                  <path d="M16 18h3V12h-3z"/>
                </svg>
                <div class="label">Visualization</div>
                <div class="value">Bars</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="expand">
                <div class="option active">
                  <label for="visualization-bars" class="custom-radio">
                    <input type="radio" id="visualization-bars" name="visualization-type" value="bars" checked="checked">
                    <span class="checkmark">Bars</span>
                  </label>
                </div>
                <div class="option">
                  <label for="visualization-stripes" class="custom-radio">
                    <input type="radio" id="visualization-stripes" name="visualization-type" value="stripes">
                    <span class="checkmark">Stripes</span>
                  </label>
                </div>
                <div class="option">
                  <label for="visualization-barcap" class="custom-radio">
                    <input type="radio" id="visualization-barcap" name="visualization-type" value="barcap">
                    <span class="checkmark">Barcap</span>
                  </label>
                </div>
                <div class="option">
                  <label for="visualization-droplets" class="custom-radio">
                    <input type="radio" id="visualization-droplets" name="visualization-type" value="droplets">
                    <span class="checkmark">Droplets</span>
                  </label>
                </div>
                <div class="option">
                  <label for="visualization-pulsecircle" class="custom-radio">
                    <input type="radio" id="visualization-pulsecircle" name="visualization-type" value="pulsecircle">
                    <span class="checkmark">Pulsating circles</span>
                  </label>
                </div>
                <div class="option">
                  <label for="visualization-orb" class="custom-radio">
                    <input type="radio" id="visualization-orb" name="visualization-type" value="orb">
                    <span class="checkmark">Orb</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>

      <div class="app-center">
        <div class="canvas-container">
          <canvas id="canvas" class="canvas uploaded-img-bg"></canvas>
          <div class="area-container">
            <div id="area" class="area">
              <div class="resizer resizer-r" data-direction="right"></div>
              <div class="resizer resizer-b" data-direction="bottom"></div>
              <div class="resizer resizer-br" data-direction="bottom-right"></div>
              <div class="resizer resizer-l" data-direction="left"></div>
              <div class="resizer resizer-t" data-direction="top"></div>
              <div class="resizer resizer-tl" data-direction="top-left"></div>
              <div class="resizer resizer-tr" data-direction="top-right"></div>
              <div class="resizer resizer-bl" data-direction="bottom-left"></div>
            </div>
          </div>
        </div>
        <div class="audio-container">
          <audio id="audio" class="audio" controls crossorigin="anonymous"></audio>
        </div>
      </div>


      <div class="menu-container">
        <div class="btn-container">
          <button id="render-btn" class="render-btn">Render</button>
        </div>
        <div class="btn-container">
          <button id="upload-img-btn" class="render-btn upload-track-btn upload-img-btn">Upload image</button>
          <input type="file" id="img-upload" accept="image/*" style="display: none;">
        </div>
        <div class="btn-container">
          <button id="upload-track-btn" class="render-btn upload-track-btn">Upload track</button>
          <input type="file" id="audio-upload" accept="audio/*" style="display: none;">
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
